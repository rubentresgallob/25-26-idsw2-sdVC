<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="logo-header">
        <mat-icon class="logo-icon">assignment</mat-icon>
        <div>
          <mat-card-title>Jorgestor</mat-card-title>
          <mat-card-subtitle>Sistema de gestión de exámenes</mat-card-subtitle>
        </div>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input
            matInput
            formControlName="email"
            type="email"
            autocomplete="email"
            placeholder="docente@centro.es"
          />
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="emailCtrl.hasError('required')"
            >El email es obligatorio</mat-error
          >
          <mat-error *ngIf="emailCtrl.hasError('email')"
            >Introduce un email válido</mat-error
          >
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input
            matInput
            formControlName="password"
            [type]="mostrarPassword ? 'text' : 'password'"
            autocomplete="current-password"
          />
          <mat-icon matPrefix>lock</mat-icon>
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="mostrarPassword = !mostrarPassword"
          >
            <mat-icon>{{
              mostrarPassword ? 'visibility_off' : 'visibility'
            }}</mat-icon>
          </button>
          <mat-error *ngIf="passwordCtrl.hasError('required')"
            >La contraseña es obligatoria</mat-error
          >
        </mat-form-field>

        <p class="error-msg" *ngIf="error">{{ error }}</p>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="submit-btn"
          [disabled]="cargando"
        >
          <mat-spinner diameter="20" *ngIf="cargando"></mat-spinner>
          <span *ngIf="!cargando">Iniciar sesión</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
